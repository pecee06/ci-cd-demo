name: Build and Deploy to EC2

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # This builds your Dockerfile and pushes it to Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Lowercase your username and repo name here
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:latest
            ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build # Only runs if the build step succeeds
    runs-on: ubuntu-latest
    steps:
      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /usr/src/app

            # Pull the fresh image from Docker Hub down to EC2
            docker compose pull

            # Recreate containers using the newly pulled image seamlessly
            docker compose up -d

            # Clean up old, untagged images on EC2
            docker image prune -f
